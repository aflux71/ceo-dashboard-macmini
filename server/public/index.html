<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>neōb Production Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f2ec; color: #2c2c2a;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: #fff; border-bottom: 1px solid #e0ddd3;
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #1d9e75; }
  header .sub { font-size: 13px; color: #888780; margin-left: auto; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; gap: 12px; }
  .msg .bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 15px;
    line-height: 1.55; white-space: pre-wrap;
  }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: #534ab7; color: #fff; max-width: 75%; }
  .msg.bot .bubble { background: #fff; border: 1px solid #e0ddd3; max-width: 85%; }
  .msg.bot .bubble.thinking { color: #888780; font-style: italic; }
  footer {
    padding: 16px 24px; background: #fff; border-top: 1px solid #e0ddd3;
  }
  .inputrow {
    max-width: 820px; margin: 0 auto; display: flex; gap: 10px;
  }
  #q {
    flex: 1; padding: 12px 16px; border: 1px solid #d3d1c7;
    border-radius: 10px; font-size: 15px; font-family: inherit;
  }
  #q:focus { outline: none; border-color: #534ab7; }
  #send {
    padding: 12px 22px; background: #534ab7; color: #fff;
    border: none; border-radius: 10px; font-size: 15px;
    cursor: pointer; font-weight: 500;
  }
  #send:disabled { opacity: 0.5; cursor: default; }
  .chips { max-width: 820px; margin: 0 auto 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 7px 12px; background: #fff; border: 1px solid #d3d1c7;
    border-radius: 8px; font-size: 13px; cursor: pointer; color: #5f5e5a;
  }
  .chip:hover { border-color: #534ab7; color: #534ab7; }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>neōb Production Assistant</h1>
  <span class="sub">live Shopify data</span>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="bubble">Hi Robert. I can see live stock across all neōb locations. Ask me what needs producing, what stores need restocked, or about any product.</div>
  </div>
</div>

<footer>
  <div class="chips">
    <span class="chip" onclick="ask(this.textContent)">What do we need to produce?</span>
    <span class="chip" onclick="ask(this.textContent)">What do stores need from HQ?</span>
    <span class="chip" onclick="ask(this.textContent)">Stock overview by location</span>
  </div>
  <div class="inputrow">
    <input id="q" placeholder="Ask the Production Assistant..." autocomplete="off">
    <button id="send">Send</button>
  </div>
</footer>

<script>
  const chat = document.getElementById('chat');
  const q = document.getElementById('q');
  const send = document.getElementById('send');
  let history = [];

  function addMsg(role, text, cls) {
    const m = document.createElement('div');
    m.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    const b = document.createElement('div');
    b.className = 'bubble' + (cls ? ' ' + cls : '');
    b.textContent = text;
    m.appendChild(b);
    chat.appendChild(m);
    chat.scrollTop = chat.scrollHeight;
    return b;
  }

  async function ask(text) {
    if (!text || !text.trim()) return;
    q.value = '';
    send.disabled = true;
    addMsg('user', text);
    const thinking = addMsg('bot', 'Checking live data...', 'thinking');

    try {
      const res = await fetch('/api/assistant', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();
      thinking.remove();
      if (data.error) {
        addMsg('bot', 'Error: ' + data.error);
      } else {
        addMsg('bot', data.answer);
        history = data.history || history;
      }
    } catch (err) {
      thinking.remove();
      addMsg('bot', 'Connection error: ' + err.message);
    }
    send.disabled = false;
    q.focus();
  }

  send.onclick = () => ask(q.value);
  q.onkeydown = (e) => { if (e.key === 'Enter') ask(q.value); };
</script>
</body>
</html>
